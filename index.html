<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chedi Jaballi — Assistant IA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2330;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --accent-glow: rgba(59,130,246,0.18);
    --text: #e8eaf0;
    --muted: #6b7280;
    --user-bubble: #1d3557;
    --ai-bubble: #181c24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; width: 100%; }

  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    background: rgba(17,19,24,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .avatar-wrap {
    position: relative;
    width: 44px; height: 44px; flex-shrink: 0;
  }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px;
    color: #fff; letter-spacing: 0.5px;
  }
  .online-dot {
    position: absolute; bottom: 1px; right: 1px;
    width: 11px; height: 11px; border-radius: 50%;
    background: #22c55e;
    border: 2px solid var(--bg);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
    50% { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
  }
  .header-info h1 {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
    color: var(--text); line-height: 1;
  }
  .header-info p {
    font-size: 11.5px; color: var(--muted); margin-top: 3px;
  }
  .header-badge {
    margin-left: auto;
    background: var(--accent-glow);
    border: 1px solid rgba(59,130,246,0.3);
    color: var(--accent2);
    font-size: 10.5px; font-weight: 500;
    padding: 4px 10px; border-radius: 20px;
    letter-spacing: 0.3px;
  }
  .portfolio-link {
    font-size: 11px; color: var(--accent2);
    text-decoration: none;
    padding: 5px 10px; border-radius: 8px;
    border: 1px solid rgba(59,130,246,0.25);
    background: var(--accent-glow);
    transition: all 0.2s;
  }
  .portfolio-link:hover { background: rgba(59,130,246,0.25); }

  #suggestions {
    display: flex; gap: 8px; padding: 10px 16px;
    overflow-x: auto; flex-shrink: 0;
    background: rgba(17,19,24,0.6);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  #suggestions::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    font-size: 12px; padding: 6px 13px; border-radius: 20px;
    background: var(--surface2); border: 1px solid var(--border);
    color: #94a3b8; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .chip:hover { background: var(--accent-glow); border-color: rgba(59,130,246,0.4); color: var(--accent2); }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row { display: flex; align-items: flex-end; gap: 9px; animation: fadeUp 0.3s ease; }
  .msg-row.user { flex-direction: row-reverse; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; font-family: 'Syne', sans-serif;
  }
  .msg-avatar.ai { background: linear-gradient(135deg, #1d4ed8, #3b82f6); color: #fff; }
  .msg-avatar.user-av { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }

  .bubble {
    max-width: 72%; padding: 11px 15px; border-radius: 16px;
    font-size: 13.5px; line-height: 1.65;
  }
  .bubble.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid rgba(59,130,246,0.3);
    border-bottom-right-radius: 4px;
    color: #dbeafe;
  }

  .bubble strong { color: var(--accent2); font-weight: 600; }
  .bubble .tag {
    display: inline-block; font-size: 11px; padding: 2px 8px;
    background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.25);
    color: var(--accent2); border-radius: 10px; margin: 2px 2px 2px 0;
  }

  .time { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }
  .ai-time { text-align: left; margin-left: 39px; }

  #typing-container { padding: 0 16px 6px; display:none; }
  .typing-row { display: flex; align-items: center; gap: 9px; }
  #typing {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 16px; border-bottom-left-radius: 4px;
    padding: 12px 16px;
  }
  .dots { display: flex; gap: 5px; }
  .dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); animation: blink 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%,80%,100% { opacity: 0.3; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1.1); }
  }

  #input-bar {
    padding: 12px 16px;
    background: rgba(17,19,24,0.9);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text);
    border-radius: 24px; padding: 11px 18px;
    font-size: 13.5px; outline: none;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s;
    resize: none; max-height: 120px; overflow-y: auto;
  }
  #send-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    color: #fff; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; box-shadow: 0 0 16px rgba(59,130,246,0.3);
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="avatar-wrap">
      <div class="avatar">CJ</div>
      <div class="online-dot"></div>
    </div>
    <div class="header-info">
      <h1>Chedi Jaballi</h1>
      <p>Alternant Développeur Full Stack · Assistant IA</p>
    </div>
    <div class="header-badge">IA Locale</div>
    <a href="https://my-portfolio-five-chi-95.vercel.app/" target="_blank" class="portfolio-link">Portfolio →</a>
  </header>

  <div id="suggestions">
    <div class="chip" onclick="send('Qui es-tu ?')">👤 Qui es-tu ?</div>
    <div class="chip" onclick="send('Quelles sont tes compétences ?')">💻 Compétences</div>
    <div class="chip" onclick="send('Parle-moi de tes projets')">🚀 Projets</div>
    <div class="chip" onclick="send('Tu cherches une alternance ?')">🎓 Alternance</div>
    <div class="chip" onclick="send('Comment te contacter ?')">📬 Contact</div>
  </div>

  <div id="messages"></div>

  <div id="typing-container">
    <div class="typing-row">
      <div class="msg-avatar ai">CJ</div>
      <div id="typing"><div class="dots"><span></span><span></span><span></span></div></div>
    </div>
  </div>

  <div id="input-bar">
    <textarea id="user-input" rows="1" placeholder="Posez une question à Chedi…"></textarea>
    <button id="send-btn" onclick="sendFromInput()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</div>

<script>
const CHEDI = {
  nom: "Chedi Jaballi",
  age: 20,
  permis: "B",
  localisation: "93300 Aubervilliers",
  telephone: "07 44 29 61 55",
  email: "jaballichedi92@gmail.com",
  linkedin: "Jaballi Chedi",
  portfolio: "https://my-portfolio-five-chi-95.vercel.app/",
  situation: "Actuellement en 2ème année de BTS SIO SLAM, candidat à un Bachelor 3 spécialisé en Data & IA pour la rentrée 2026.",

  competences: {
    langages: ["HTML", "CSS", "JavaScript", "Python", "PHP", "SQL", "C#"],
    frontend: ["React Native", "Flutter", "Tailwind CSS", ".NET MAUI"],
    backend: ["PHP (Symfony)", "SQL", "SQLite"],
    ia: ["Prompt Engineering", "Claude", "Grok", "Make"],
    outils: ["VS Code", "Git", "GitHub", "Figma", "Android Studio"]
  },

  projets: [
    {
      nom: "Socializus",
      type: "Application Mobile (Projet de groupe)",
      techno: ["React Native", "JavaScript", "Firebase"],
      detail: "Participation au développement d'une application d'intégration sociale facilitant les échanges linguistiques et les sorties."
    },
    {
      nom: "Meetub",
      type: "Plateforme Web (Projet de groupe)",
      techno: ["PHP", "Symfony", "MySQL", "Tailwind CSS"],
      detail: "Collaboration sur la création d'un site communautaire pour la mise en relation d'utilisateurs par centres d'intérêt."
    },
    {
      nom: "GreenDesk",
      type: "Site Web de Gestion (Projet Solo)",
      techno: ["HTML", "CSS", "JavaScript", "PHP"],
      detail: "Conception complète d'une plateforme dédiée à l'optimisation des espaces de travail écologiques."
    },
    {
      nom: "Snake Game",
      type: "Mini-jeu classique",
      techno: ["JavaScript", "HTML5 Canvas"],
      detail: "Développement en solo du célèbre jeu de serpent, focalisé sur la logique algorithmique."
    },
    {
      nom: "SMART BIKE",
      type: "Site web dynamique",
      techno: ["HTML", "CSS", "PHP", "SQL"],
      detail: "Site dynamique pour l'exploration et la commande de vélos électriques."
    }
  ],

  alternance: {
    poste: "Bachelor 3 Data & IA",
    rentree: "Rentrée 2026",
    detail: "Je recherche une entreprise pour une alternance spécialisée en Data & IA."
  }
};

function getTime() { return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }); }

function detect(text, keywords) {
  const t = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  return keywords.some(k => t.includes(k.normalize("NFD").replace(/[\u0300-\u036f]/g, "")));
}

function buildResponse(q) {
  if (detect(q, ['qui es-tu','presentation','salut','bonjour'])) {
    return `Bonjour ! 👋 Je suis <strong>Chedi Jaballi</strong>, 20 ans.<br>Je suis <strong>Alternant Développeur Full Stack</strong> et je me spécialise en <strong>Data & IA</strong>.<br>Découvrez mes projets comme Socializus ou Meetub !`;
  }
  if (detect(q, ['projet','socializus','meetub','greendesk','snake','smart bike'])) {
    return `Voici mes réalisations 🚀 :<br><br>` + CHEDI.projets.map(p => `<strong>${p.nom}</strong> — <em>${p.type}</em><br>${p.techno.map(t=>`<span class="tag">${t}</span>`).join('')}<br>${p.detail}`).join('<br><br>');
  }
  if (detect(q, ['competence','skill','techno'])) {
    return `Mon stack technique 💻 :<br><br><strong>Langages :</strong> ${CHEDI.competences.langages.join(', ')}<br><strong>Frameworks :</strong> ${CHEDI.competences.frontend.join(', ')}`;
  }
  if (detect(q, ['contact','email','tel'])) {
    return `Contactez-moi ici :<br>📧 ${CHEDI.email}<br>📞 ${CHEDI.telephone}`;
  }
  return `Je peux vous parler de mes projets (**Meetub**, **Socializus**, etc.), de mes compétences ou de ma recherche d'alternance !`;
}

const messagesDiv = document.getElementById('messages');
const typingContainer = document.getElementById('typing-container');
const inputEl = document.getElementById('user-input');

function appendMsg(html, isUser) {
  const row = document.createElement('div');
  row.className = `msg-row ${isUser ? 'user' : ''}`;
  const bubble = document.createElement('div');
  bubble.className = `bubble ${isUser ? 'user' : 'ai'}`;
  bubble.innerHTML = html;
  
  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${isUser ? 'user-av' : 'ai'}`;
  avatar.textContent = isUser ? '👤' : 'CJ';

  if (isUser) { row.appendChild(bubble); row.appendChild(avatar); } 
  else { row.appendChild(avatar); row.appendChild(bubble); }
  
  messagesDiv.appendChild(row);
  const t = document.createElement('div'); t.className=`time ${isUser?'':'ai-time'}`; t.textContent=getTime();
  messagesDiv.appendChild(t);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function send(text) {
  const msg = text.trim(); if(!msg) return;
  inputEl.value = ''; appendMsg(msg, true);
  typingContainer.style.display = 'block';
  setTimeout(() => {
    typingContainer.style.display = 'none';
    appendMsg(buildResponse(msg), false);
  }, 800);
}

function sendFromInput() { send(inputEl.value); }
inputEl.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendFromInput(); }});

setTimeout(() => {
  appendMsg(`Bonjour ! 👋 Je suis l'assistant de <strong>Chedi Jaballi</strong>. Posez-moi des questions sur mes projets (**Meetub**, **Socializus**) ou mes compétences !`, false);
}, 300);
</script>
</body>
</html>
