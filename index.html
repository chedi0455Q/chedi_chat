<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chedi Jaballi — Assistant IA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2330;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --accent-glow: rgba(59,130,246,0.18);
    --text: #e8eaf0;
    --muted: #6b7280;
    --user-bubble: #1d3557;
    --ai-bubble: #181c24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

 
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; width: 100%; }

 
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    background: rgba(17,19,24,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .avatar-wrap {
    position: relative;
    width: 44px; height: 44px; flex-shrink: 0;
  }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px;
    color: #fff; letter-spacing: 0.5px;
  }
  .online-dot {
    position: absolute; bottom: 1px; right: 1px;
    width: 11px; height: 11px; border-radius: 50%;
    background: #22c55e;
    border: 2px solid var(--bg);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
    50% { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
  }
  .header-info h1 {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
    color: var(--text); line-height: 1;
  }
  .header-info p {
    font-size: 11.5px; color: var(--muted); margin-top: 3px;
  }
  .header-badge {
    margin-left: auto;
    background: var(--accent-glow);
    border: 1px solid rgba(59,130,246,0.3);
    color: var(--accent2);
    font-size: 10.5px; font-weight: 500;
    padding: 4px 10px; border-radius: 20px;
    letter-spacing: 0.3px;
  }
  .portfolio-link {
    font-size: 11px; color: var(--accent2);
    text-decoration: none;
    padding: 5px 10px; border-radius: 8px;
    border: 1px solid rgba(59,130,246,0.25);
    background: var(--accent-glow);
    transition: all 0.2s;
  }
  .portfolio-link:hover { background: rgba(59,130,246,0.25); }


  #suggestions {
    display: flex; gap: 8px; padding: 10px 16px;
    overflow-x: auto; flex-shrink: 0;
    background: rgba(17,19,24,0.6);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  #suggestions::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    font-size: 12px; padding: 6px 13px; border-radius: 20px;
    background: var(--surface2); border: 1px solid var(--border);
    color: #94a3b8; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .chip:hover { background: var(--accent-glow); border-color: rgba(59,130,246,0.4); color: var(--accent2); }

  
  #messages {
    flex: 1; overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row { display: flex; align-items: flex-end; gap: 9px; animation: fadeUp 0.3s ease; }
  .msg-row.user { flex-direction: row-reverse; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; font-family: 'Syne', sans-serif;
  }
  .msg-avatar.ai { background: linear-gradient(135deg, #1d4ed8, #3b82f6); color: #fff; }
  .msg-avatar.user-av { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }

  .bubble {
    max-width: 72%; padding: 11px 15px; border-radius: 16px;
    font-size: 13.5px; line-height: 1.65;
  }
  .bubble.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid rgba(59,130,246,0.3);
    border-bottom-right-radius: 4px;
    color: #dbeafe;
  }

  .bubble strong { color: var(--accent2); font-weight: 600; }
  .bubble a { color: var(--accent2); text-decoration: underline; text-underline-offset: 2px; }
  .bubble ul { margin: 6px 0 0 16px; }
  .bubble li { margin: 3px 0; }
  .bubble .tag {
    display: inline-block; font-size: 11px; padding: 2px 8px;
    background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.25);
    color: var(--accent2); border-radius: 10px; margin: 2px 2px 2px 0;
  }

  .time { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }
  .ai-time { text-align: left; margin-left: 39px; }

 
  .typing-row { display: flex; align-items: center; gap: 9px; }
  #typing {
    display: none;
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 16px; border-bottom-left-radius: 4px;
    padding: 12px 16px;
  }
  .dots { display: flex; gap: 5px; }
  .dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); animation: blink 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%,80%,100% { opacity: 0.3; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1.1); }
  }

 
  #input-bar {
    padding: 12px 16px;
    background: rgba(17,19,24,0.9);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text);
    border-radius: 24px; padding: 11px 18px;
    font-size: 13.5px; outline: none;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s;
    resize: none; max-height: 120px; overflow-y: auto;
  }
  #user-input::placeholder { color: var(--muted); }
  #user-input:focus { border-color: rgba(59,130,246,0.5); }

  #send-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    color: #fff; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; box-shadow: 0 0 16px rgba(59,130,246,0.3);
  }
  #send-btn:hover { transform: scale(1.07); box-shadow: 0 0 22px rgba(59,130,246,0.5); }
  #send-btn:active { transform: scale(0.96); }
  #send-btn svg { width: 18px; height: 18px; }
</style>
</head>

function getTime() {
  return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function detect(text, keywords) {
  const t = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  return keywords.some(k => t.includes(k.normalize("NFD").replace(/[\u0300-\u036f]/g, "")));
}

function buildResponse(question) {
  const q = question;

  
  if (detect(q, ['bonjour','salut','hello','qui es-tu','qui etes','presentation','présentation','présente','tu es qui','c\'est quoi','about'])) {
    return `Bonjour ! 👋 Je suis <strong>Chedi Jaballi</strong>, 20 ans, basé à Aubervilliers (93).<br><br>
Je suis <strong>Alternant Développeur Full Stack</strong>, actuellement en 2ème année de BTS SIO SLAM. Je prépare un <strong>Bachelor 3 spécialisé en Data & IA</strong> en alternance pour la rentrée 2026.<br><br>
Je suis passionné par le développement, l'IA et les données — toujours curieux, toujours en train d'apprendre ! 🚀<br><br>
Retrouve mon travail sur mon <a href="${CHEDI.portfolio}" target="_blank">portfolio</a>.`;
  }

  
  if (detect(q, ['competence','compétence','skill','technologie','langages','maîtrise','sais faire','stack','outil','langage'])) {
    const C = CHEDI.competences;
    return `Voici mon stack technique 💻 :<br><br>
<strong>Langages :</strong><br>${C.langages.map(t=>`<span class="tag">${t}</span>`).join('')}<br><br>
<strong>Frontend / Mobile :</strong><br>${C.frontend.concat(C.mobile).filter((v,i,a)=>a.indexOf(v)===i).map(t=>`<span class="tag">${t}</span>`).join('')}<br><br>
<strong>IA & Automation :</strong><br>${C.ia.map(t=>`<span class="tag">${t}</span>`).join('')}<br><br>
<strong>Systèmes & Outils :</strong><br>${C.systemes.concat(C.outils).map(t=>`<span class="tag">${t}</span>`).join('')}`;
  }


  
  if (detect(q, ['projet','projects','portfolio','réalisation','creation','application','site','jeu','crypto','speed','smart bike','trading'])) {
    return `J'ai réalisé plusieurs projets concrets 🚀 :<br><br>` +
      CHEDI.projets.map(p =>
        `<strong>${p.nom}</strong> — <em>${p.type}</em><br>
        ${p.techno.map(t=>`<span class="tag">${t}</span>`).join('')}<br>
        ${p.detail}`
      ).join('<br><br>') +
      `<br><br>Retrouve-les en détail sur mon <a href="${CHEDI.portfolio}" target="_blank">portfolio →</a>`;
  }

  // Alternance / recherche
  if (detect(q, ['alternance','stage','recherche','disponible','disponibilité','bachelor','recrutement','poste','opportunite','opportunité','embauche'])) {
    const a = CHEDI.alternance;
    return `Oui, je suis activement à la recherche d'une alternance ! 🎓<br><br>
<strong>Poste recherché :</strong> ${a.poste}<br>
<strong>Disponibilité :</strong> ${a.rentree}<br><br>
${a.detail}<br><br>
N'hésitez pas à me contacter directement 👇<br>
📧 <strong>${CHEDI.email}</strong><br>
📞 <strong>${CHEDI.telephone}</strong>`;
  }

  // Expérience
  if (detect(q, ['experience','expérience','stage','travail','artem','artem5','mission','entreprise'])) {
    const e = CHEDI.experience[0];
    return `Mon expérience professionnelle principale :<br><br>
<strong>${e.titre}</strong><br>
📅 ${e.periode}<br><br>
${e.detail}`;
  }

  // Contact
  if (detect(q, ['contact','joindre','appel','email','mail','téléphone','telephone','linkedin','coordonnée','coordonnées','parler'])) {
    return `Je suis toujours disponible pour échanger ! 📬<br><br>
📧 <strong>${CHEDI.email}</strong><br>
📞 <strong>${CHEDI.telephone}</strong><br>
💼 LinkedIn : <strong>${CHEDI.linkedin}</strong><br>
🌐 Portfolio : <a href="${CHEDI.portfolio}" target="_blank">my-portfolio-five-chi-95.vercel.app</a><br>
📍 ${CHEDI.localisation}`;
  }

  
  if (detect(q, ['formation','etude','études','bts','bachelor','epsi','bac','école','diplome','diplôme'])) {
    return `Mon parcours scolaire 🏫 :<br><br>` +

        `<strong>${f.titre}</strong><br>📅 ${f.periode}<br>${f.detail}`

  }

  if (detect(q, ['langue','language','anglais','allemand','parle','bilingue','niveau'])) {
    return `Je parle plusieurs langues 🌍 :<br><br>` +

  }

    return `Quelques infos sur moi ℹ️ :<br><br>
🎂 <strong>${CHEDI.age} ans</strong><br>
📍 <strong>${CHEDI.localisation}</strong><br>
🚗 Permis <strong>${CHEDI.permis}</strong>`;
  }

  
  if (detect(q, ['ia','intelligence artificielle','data','machine learning','ml','prompt','grok','claude'])) {
    return `L'IA et la Data, c'est ma passion actuelle ! 🤖<br><br>
Je pratique le <strong>Prompt Engineering</strong> avec Claude et Grok au quotidien — notamment pour optimiser du code et automatiser des workflows.<br><br>

const messagesDiv = document.getElementById('messages');
const typingContainer = document.getElementById('typing-container');
const inputEl = document.getElementById('user-input');

function appendMsg(html, isUser) {
  const row = document.createElement('div');
  row.className = `msg-row ${isUser ? 'user' : ''}`;

  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${isUser ? 'user-av' : 'ai'}`;
  avatar.textContent = isUser ? '👤' : 'CJ';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${isUser ? 'user' : 'ai'}`;
  bubble.innerHTML = html;

  if (isUser) {
    row.appendChild(bubble);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(bubble);
  }

  const timeEl = document.createElement('div');
  timeEl.className = `time ${isUser ? '' : 'ai-time'}`;
  timeEl.textContent = getTime();

  messagesDiv.appendChild(row);
  messagesDiv.appendChild(timeEl);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function send(text) {
  const msg = text.trim();
  if (!msg) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  appendMsg(msg, true);
  typingContainer.style.display = 'block';
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  setTimeout(() => {
    typingContainer.style.display = 'none';
    const reply = buildResponse(msg);
    appendMsg(reply, false);
  }, 700 + Math.random() * 600);
}

function sendFromInput() {
  send(inputEl.value);
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendFromInput();
  }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});
