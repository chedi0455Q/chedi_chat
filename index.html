<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chedi Jaballi — Assistant IA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c24; --border: #1e2330;
    --accent: #3b82f6; --accent2: #60a5fa; --accent-glow: rgba(59,130,246,0.18);
    --text: #e8eaf0; --muted: #6b7280; --user-bubble: #1d3557; --ai-bubble: #181c24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  #app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; width: 100%; }
  header { display: flex; align-items: center; gap: 14px; padding: 14px 20px; background: rgba(17,19,24,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #1d4ed8, #3b82f6); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; color: #fff; }
  .header-info h1 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
  .header-info p { font-size: 11px; color: var(--muted); }
  #suggestions { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; background: rgba(17,19,24,0.6); border-bottom: 1px solid var(--border); scrollbar-width: none; }
  .chip { flex-shrink: 0; font-size: 12px; padding: 6px 13px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: #94a3b8; cursor: pointer; }
  #messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; }
  .msg-row { display: flex; align-items: flex-end; gap: 9px; animation: fadeUp 0.3s ease; }
  .msg-row.user { flex-direction: row-reverse; }
  .bubble { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 13.5px; line-height: 1.6; }
  .bubble.ai { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .bubble.user { background: var(--user-bubble); border: 1px solid rgba(59,130,246,0.3); border-bottom-right-radius: 4px; }
  .tag { display: inline-block; font-size: 10px; padding: 2px 8px; background: rgba(59,130,246,0.15); color: var(--accent2); border-radius: 8px; margin-right: 4px; margin-top: 4px; border: 1px solid rgba(59,130,246,0.3); }
  #input-bar { padding: 15px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; }
  #user-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: #fff; border-radius: 20px; padding: 10px 15px; outline: none; resize: none; }
  #send-btn { background: var(--accent); color: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="avatar">CJ</div>
    <div class="header-info"><h1>Chedi Jaballi</h1><p>Développeur Full Stack · Expert IA</p></div>
    <a href="#" class="ml-auto text-xs text-blue-400">Portfolio →</a>
  </header>

  <div id="suggestions">
    <div class="chip" onclick="send('Tes projets')">🚀 Mes Projets</div>
    <div class="chip" onclick="send('Compétences')">💻 Compétences</div>
    <div class="chip" onclick="send('Contact')">📬 Contact</div>
  </div>

  <div id="messages"></div>

  <div id="input-bar">
    <textarea id="user-input" rows="1" placeholder="Posez une question..."></textarea>
    <button id="send-btn" onclick="sendFromInput()">➔</button>
  </div>
</div>

<script>
const CHEDI = {
  projets: [
    { nom: "Meetub", type: "Plateforme Web", techno: ["PHP", "Symfony", "MySQL"], detail: "Site communautaire de mise en relation d'utilisateurs." },
    { nom: "Socializus", type: "Application Mobile", techno: ["React Native", "Firebase"], detail: "Application pour les sorties et l'intégration sociale." },
    { nom: "GreenDesk", type: "Site Web (Solo)", techno: ["HTML", "CSS", "PHP"], detail: "Plateforme d'organisation d'espaces de travail éco-responsables." },
    { nom: "Snake Game", type: "Jeu JavaScript", techno: ["JS Canvas"], detail: "Développement d'un jeu classique en pur JavaScript." },
    { nom: "Smart Bike", type: "Site Dynamique", techno: ["PHP", "SQL"], detail: "Système de commande de vélos électriques." }
  ]
};

function appendMsg(html, isUser) {
  const div = document.createElement('div');
  div.className = `msg-row ${isUser ? 'user' : ''}`;
  div.innerHTML = `<div class="bubble ${isUser ? 'user' : 'ai'}">${html}</div>`;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function send(txt) {
  if (!txt.trim()) return;
  appendMsg(txt, true);
  
  setTimeout(() => {
    let res = "Je peux vous parler de mes projets (**Meetub**, **Socializus**, **GreenDesk**) ou de mes compétences.";
    const t = txt.toLowerCase();

    if (t.includes('projet') || t.includes('réalisation')) {
      res = "Voici mes projets principaux 🚀 :<br><br>" + CHEDI.projets.map(p => 
        `<strong>${p.nom}</strong> (${p.type})<br>` + 
        p.techno.map(tech => `<span class="tag">${tech}</span>`).join('') + 
        `<br><small>${p.detail}</small>`
      ).join('<br><br>');
    }
    
    appendMsg(res, false);
  }, 600);
}

function sendFromInput() {
  const input = document.getElementById('user-input');
  send(input.value);
  input.value = '';
}

// Message de bienvenue avec les nouveaux projets cités direct !
window.onload = () => {
  appendMsg("Bonjour ! 👋 Je suis l'IA de Chedi. J'ai récemment travaillé sur <strong>Meetub</strong> (Symfony) et <strong>Socializus</strong> (React Native).<br><br>Cliquez sur 🚀 <strong>Mes Projets</strong> pour voir la liste complète !", false);
};
</script>
</body>
</html>
