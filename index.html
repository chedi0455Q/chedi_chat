function getTime() {
  return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

function detect(text, keywords) {
  const t = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  return keywords.some(k => t.includes(k.normalize("NFD").replace(/[\u0300-\u036f]/g, "")));
}

// --- Logique d'affichage (Inchangée) ---
const messagesDiv = document.getElementById('messages');
const typingContainer = document.getElementById('typing-container');
const inputEl = document.getElementById('user-input');

function appendMsg(html, isUser) {
  const row = document.createElement('div');
  row.className = `msg-row ${isUser ? 'user' : ''}`;
  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${isUser ? 'user-av' : 'ai'}`;
  avatar.textContent = isUser ? '👤' : 'CJ';
  const bubble = document.createElement('div');
  bubble.className = `bubble ${isUser ? 'user' : 'ai'}`;
  bubble.innerHTML = html;
  if (isUser) { row.appendChild(bubble); row.appendChild(avatar); } 
  else { row.appendChild(avatar); row.appendChild(bubble); }
  const timeEl = document.createElement('div');
  timeEl.className = `time ${isUser ? '' : 'ai-time'}`;
  timeEl.textContent = getTime();
  messagesDiv.appendChild(row);
  messagesDiv.appendChild(timeEl);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function send(text) {
  const msg = text.trim();
  if (!msg) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  appendMsg(msg, true);
  typingContainer.style.display = 'block';
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  setTimeout(() => {
    typingContainer.style.display = 'none';
    const reply = buildResponse(msg);
    appendMsg(reply, false);
  }, 700 + Math.random() * 600);
}

function sendFromInput() { send(inputEl.value); }
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFromInput(); } });

Posez-moi des questions sur ses projets comme <strong>Socializus</strong>, <strong>Meetub</strong> ou ses compétences en <strong>Data & IA</strong> ! 🚀`, false);
